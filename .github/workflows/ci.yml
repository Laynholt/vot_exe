name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  windows-compile:
    name: windows-compile
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Build EXE
        shell: pwsh
        run: |
          $env:VOT_HELPER_RELEASE='development'
          bun run build
      - run: .\dist\vot-helper.exe --help
      - run: .\dist\vot-helper.exe --version
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vot-helper-windows-x64
          path: dist/vot-helper.exe

  live-integration:
    name: live-integration
    runs-on: windows-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run scripts/live-smoke.ts
        env:
          VOT_WORKER_HOST: ${{ vars.VOT_WORKER_HOST }}
          VOT_API_TOKEN: ${{ secrets.VOT_API_TOKEN }}
          VOT_YANDEX_COOKIE: ${{ secrets.VOT_YANDEX_COOKIE }}
          VOT_LIVE_SMOKE_REQUIRED: ${{ vars.VOT_LIVE_SMOKE_REQUIRED }}
