name: Dependabot trusted automerge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Verify dependency-only Dependabot PR and merge
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_PULL_REQUESTS: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          set -euo pipefail

          prs_json="$RUN_PULL_REQUESTS"
          pr_count="$(jq 'length' <<<"$prs_json")"
          if [ "$pr_count" != "1" ]; then
            echo "Skipping: CI run is not associated with exactly one pull request."
            exit 0
          fi

          pr_number="$(jq -r '.[0].number' <<<"$prs_json")"
          pr_json="$(gh api "/repos/$REPO/pulls/$pr_number")"
          if [ "$(jq -r '.user.login' <<<"$pr_json")" != "dependabot[bot]" ]; then
            echo "Skipping PR #$pr_number: author is not dependabot[bot]."
            exit 0
          fi
          if [ "$(jq -r '.base.ref' <<<"$pr_json")" != "master" ]; then
            echo "Skipping PR #$pr_number: base branch is not master."
            exit 0
          fi

          files_json="$(gh api --paginate "/repos/$REPO/pulls/$pr_number/files")"
          if ! jq -e 'all(.filename == "package.json" or .filename == "bun.lock")' <<<"$files_json" >/dev/null; then
            echo "Skipping PR #$pr_number: not an npm package/bun.lock update."
            exit 0
          fi

          base_sha="$(jq -r '.base.sha' <<<"$pr_json")"
          head_sha="$(jq -r '.head.sha' <<<"$pr_json")"
          base_pkg="$(gh api "/repos/$REPO/contents/package.json?ref=$base_sha" --jq '.content' | base64 -d)"
          head_pkg="$(gh api "/repos/$REPO/contents/package.json?ref=$head_sha" --jq '.content' | base64 -d)"

          BASE_PKG="$base_pkg" HEAD_PKG="$head_pkg" node <<'NODE'
          const baseRaw = process.env.BASE_PKG;
          const headRaw = process.env.HEAD_PKG;
          if (!baseRaw || !headRaw) {
            throw new Error("missing package.json inputs");
          }
          const base = JSON.parse(baseRaw);
          const head = JSON.parse(headRaw);
          const before = structuredClone(base);
          const after = structuredClone(head);
          delete before.dependencies?.["@vot.js/node"];
          delete after.dependencies?.["@vot.js/node"];
          if (JSON.stringify(before) !== JSON.stringify(after)) {
            throw new Error("package.json changed outside dependencies[@vot.js/node]");
          }
          if (base.dependencies?.["@vot.js/node"] === head.dependencies?.["@vot.js/node"]) {
            throw new Error("@vot.js/node version did not change");
          }
          NODE

          gh pr merge "$pr_number" --repo "$REPO" --squash --delete-branch
