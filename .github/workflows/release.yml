name: Release

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Calculate release tag
        id: tag
        shell: pwsh
        run: |
          $version = node -e "const p=require('./package.json'); const v=p.dependencies['@vot.js/node']; if(!/^\d+\.\d+\.\d+$/.test(v)){process.exit(2)} console.log(v)"
          if ($LASTEXITCODE -ne 0) {
            throw '@vot.js/node dependency must be an exact X.Y.Z version'
          }

          $prefix = "vot-$version-r"
          $tags = git tag --list "$prefix*"
          $maxRevision = 0
          foreach ($tag in $tags) {
            if ($tag -match "^vot-$([regex]::Escape($version))-r(\d+)$") {
              $revision = [int]$Matches[1]
              if ($revision -gt $maxRevision) {
                $maxRevision = $revision
              }
            }
          }

          $nextRevision = $maxRevision + 1
          $releaseTag = "vot-$version-r$nextRevision"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$releaseTag" >> $env:GITHUB_OUTPUT

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

      - name: Build release EXE
        shell: pwsh
        run: |
          $env:VOT_HELPER_RELEASE='${{ steps.tag.outputs.tag }}'
          bun run build
          .\dist\vot-helper.exe --help
          .\dist\vot-helper.exe --version

      - name: Package release assets
        shell: pwsh
        run: |
          Compress-Archive -Path .\dist\vot-helper.exe -DestinationPath .\dist\vot-helper-windows-x64.zip -Force
          $exeHash = (Get-FileHash .\dist\vot-helper.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          $zipHash = (Get-FileHash .\dist\vot-helper-windows-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$exeHash  vot-helper.exe" | Set-Content -Path .\dist\SHA256SUMS.txt -NoNewline
          "`n$zipHash  vot-helper-windows-x64.zip`n" | Add-Content -Path .\dist\SHA256SUMS.txt -NoNewline

      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            dist/vot-helper.exe
            dist/vot-helper-windows-x64.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          VOT_VERSION: ${{ steps.tag.outputs.version }}
        shell: pwsh
        run: |
          $notes = @"
          Unofficial vot-helper build for @vot.js/node $env:VOT_VERSION.

          Assets:
          - vot-helper.exe
          - vot-helper-windows-x64.zip
          - SHA256SUMS.txt

          The executable is unsigned. Verify checksums and GitHub build provenance before use.
          "@

          gh release create $env:RELEASE_TAG `
            .\dist\vot-helper.exe `
            .\dist\vot-helper-windows-x64.zip `
            .\dist\SHA256SUMS.txt `
            --title $env:RELEASE_TAG `
            --notes $notes `
            --latest
